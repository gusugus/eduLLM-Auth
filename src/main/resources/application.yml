jwt:
  # Clave secreta (debe tener al menos 256 bits / 32 caracteres)
  # En producción, usa una variable de entorno o un secreto de Vault
  secret: "404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970"
  expiration: 86400000 # 24 horas en milisegundos
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/edu_llm
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
logging:
  level:
    org.springframework.security: INFO   # o DEBUG si quieres más detalle
    autenticacionWeb: DEBUG
  file:
    name: logs/auth.log                    # guarda en archivo
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30