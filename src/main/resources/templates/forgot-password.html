<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - EduLLM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-500 via-blue-700 to-blue-950 flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
    <h2 class="text-2xl font-bold text-center text-blue-700 mb-2">Recuperar Contraseña</h2>
    <p class="text-center text-gray-500 text-sm mb-6">Ingresa tu usuario y te enviaremos las instrucciones.</p>

    <form id="forgotForm">
        <input type="text" id="username" placeholder="Nombre de Usuario" required
               class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent mb-4 block">
        <button type="submit"
                class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-colors duration-200 cursor-pointer">
            Enviar Instrucciones
        </button>
    </form>

    <div id="message" class="mt-4 text-center text-sm text-green-600"></div>

    <div class="mt-4 text-center">
        <a href="/login" class="text-blue-600 hover:underline text-sm">← Volver al inicio de sesión</a>
    </div>
</div>

<script th:src="@{/js/forgot-password.js}"></script>
</body>
</html>
