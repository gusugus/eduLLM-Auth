<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva Contraseña</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 10px; margin: 5px 0; }
    </style>
</head>
<body>
<div class="container">
    <h2>Crear Nueva Contraseña</h2>
	<form id="resetForm">
	    <input type="hidden" id="token" th:value="${token}" />
	    <input type="password" id="newPassword" placeholder="Nueva Contraseña" required>
	    <input type="password" id="confirmPassword" placeholder="Confirmar Contraseña" required>
	    <button type="submit">Restablecer Contraseña</button>
	</form>
    <div id="message" style="margin-top: 10px; color: green;"></div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var token = /*[[${token}]]*/ '';
    /*]]>*/
</script>
   


<script>
   
	document.getElementById('resetForm').addEventListener('submit', async function(e) {
	    e.preventDefault(); // Esto es crítico
	    const token = document.getElementById('token').value;
	    const newPassword = document.getElementById('newPassword').value;
	    const confirmPassword = document.getElementById('confirmPassword').value;
	    
	    if (newPassword !== confirmPassword) {
	        document.getElementById('message').textContent = "Las contraseñas no coinciden.";
	        document.getElementById('message').style.color = "red";
	        return;
	    }
	    
	    try {
	        const response = await fetch('/api/auth/reset-password', {
	            method: 'POST',
	            headers: {'Content-Type': 'application/json'},
	            body: JSON.stringify({ token: token, newPassword: newPassword })
	        });
	        const data = await response.text();
	        document.getElementById('message').textContent = data;
	        document.getElementById('message').style.color = response.ok ? "green" : "red";
	        if(response.ok) {
	            setTimeout(() => window.location.href = '/login', 2000);
	        }
	    } catch (error) {
	        document.getElementById('message').textContent = "Error de conexión";
	        document.getElementById('message').style.color = "red";
	    }
	});
</script>
</body>
</html>
