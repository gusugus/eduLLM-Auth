<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña - EduLLM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body class="min-h-screen bg-gray-100 flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
    <h2 class="text-2xl font-bold text-center text-blue-700 mb-6">Crear Nueva Contraseña</h2>

    <form id="resetForm">
        <input type="hidden" id="token" th:value="${token}" />
        <input type="password" id="newPassword" placeholder="Nueva Contraseña" required
               class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent mb-3 block">
        <input type="password" id="confirmPassword" placeholder="Confirmar Contraseña" required
               class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent mb-4 block">
        <button type="submit"
                class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-colors duration-200 cursor-pointer">
            Restablecer Contraseña
        </button>
    </form>

    <div id="message" class="mt-4 text-center text-sm"></div>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    var token = /*[[${token}]]*/ '';
    /*]]>*/
</script>
<script th:src="@{/js/reset-password.js}"></script>
</body>
</html>
