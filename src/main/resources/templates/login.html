<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - EduLLM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link th:href="@{/css/auth.css}" rel="stylesheet">
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-500 via-blue-700 to-blue-950 flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md mx-4">
    <h2 class="text-2xl font-bold text-center text-blue-700 mb-6">EduLLM - Acceso</h2>

    <form id="loginForm">
        <input type="text" id="username" placeholder="Usuario" required autofocus
               class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent mb-3 block">
        <input type="password" id="password" placeholder="Contraseña" required
               class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent mb-4 block">
        <button type="submit"
                class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-colors duration-200 cursor-pointer">
            Ingresar
        </button>
    </form>

    <div id="message" class="mt-4 text-center text-sm"></div>

    <div class="mt-4 text-center">
        <a href="/forgot-password" class="text-blue-600 hover:underline text-sm">¿Olvidaste tu contraseña?</a>
    </div>
</div>

<script th:src="@{/js/login.js}"></script>
</body>
</html>
